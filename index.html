<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --fg: #e0e0e0;
            --card-bg: #1c1c1c;
            --accent: #ffb74d;
            --danger: #e57373;
            --success: #66bb6a;
            --info: #90caf9;
            --muted-red: #7a4a4a;
            --muted-green: #4a6b4a;
            --pill-bg: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: #888;
        }

        /* Setup / Journal */
        #setup-screen {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            width: 100%;
        }

        .setup-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        #setup-screen input {
            background: #2a2a2a;
            border: 1px solid #333;
            color: var(--fg);
            padding: 0.9rem 1rem;
            border-radius: 10px;
            font-size: 1rem;
            width: 100%;
            max-width: 380px;
        }

        #setup-screen input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .pill-btn {
            background: var(--pill-bg);
            color: #fff;
            border: none;
            padding: 0.9rem 2.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s;
            min-width: 180px;
        }

        .pill-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .pill-btn:disabled { opacity: 0.5; pointer-events: none; }
        .pill-btn.accent { background: var(--accent); color: #1a1a1a; }

        /* Timer */
        #timer-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            animation: fadeIn 0.3s;
        }

        #session-info {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        #session-info .title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            word-break: break-word;
            color: var(--fg);
        }

        #session-info .expected {
            font-size: 0.9rem;
            color: #aaa;
        }

        .clock-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2.5rem 1.5rem;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }

        .clock-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            color: #888;
        }

        .clock-display {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
            font-size: 5rem;
            line-height: 1;
            color: var(--accent);
        }

        #wasted-clock .clock-display {
            font-size: 3.2rem;
            color: var(--danger);
            opacity: 0.9;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            font-weight: 500;
            min-width: 120px;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; pointer-events: none; }

        .btn-play { background: var(--muted-green); color: #fff; }
        .btn-stop { background: var(--muted-red); color: #fff; }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.2s;
        }

        .modal {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            text-align: center;
            max-width: 380px;
            width: 90%;
        }

        .modal h3 {
            margin-bottom: 2rem;
            font-weight: 400;
            font-size: 1.2rem;
        }

        .modal input {
            background: #2a2a2a;
            border: 1px solid #333;
            color: var(--fg);
            padding: 0.9rem 1rem;
            border-radius: 10px;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
        }

        .modal input:focus { outline: none; border-color: var(--accent); }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        /* Journal */
        #journal-section {
            width: 100%;
            margin-top: 2rem;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.9rem;
            min-width: 600px;
        }

        th, td {
            padding: 0.75rem 0.5rem;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            color: #888;
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 0.85rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-completed { background: rgba(102, 187, 106, 0.2); color: var(--success); }
        .status-abandoned { background: rgba(229, 115, 115, 0.2); color: var(--danger); }

        .journal-actions {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

       /* Timeline Section */
        #timeline-screen {
            display: none;
            flex-direction: column;
            width: 100%;
            gap: 0.5rem;
            animation: fadeIn 0.3s;
        }

        .timeline-filters-wrapper {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .timeline-filter {
            background: #333;
            color: #fff;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            min-width: 0;
            border-radius: 8px;
        }

        .timeline-filter.active { background: var(--accent); color: #1a1a1a; }

        /* Custom Scrollbar */
        #timeline-scroll-area {
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
        }
        #timeline-scroll-area::-webkit-scrollbar { width: 8px; }
        #timeline-scroll-area::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

        /* Daily Card UI */
        .timeline-day-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .timeline-day-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.75rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .timeline-date { font-size: 1.1rem; font-weight: 600; color: var(--fg); }
        .timeline-totals { font-size: 0.85rem; display: flex; gap: 1rem; flex-wrap: wrap; }
        .timeline-totals span { display: flex; align-items: center; gap: 0.4rem; color: #ccc; }
        .dot-work { color: var(--success); font-size: 1.2rem;}
        .dot-waste { color: var(--danger); font-size: 1.2rem;}
        .dot-legit { color: var(--accent); font-size: 1.2rem;}
 .dot-untracked { color: #777; font-size: 1.2rem; }
        .timeline-track-segment.untracked { background: #333; }
        .event-badge.untracked { background: rgba(119, 119, 119, 0.15); color: #aaa; }

        /* Visual 24h Track */
        .timeline-track-container {
            position: relative;
            width: 100%;
            height: 24px;
            background: #0a0a0a;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            border: 1px solid #333;
        }
        .timeline-track-segment {
            position: absolute;
            height: 100%;
            top: 0;
            opacity: 0.85;
            transition: opacity 0.2s, transform 0.1s;
        }
        .timeline-track-segment:hover {
            opacity: 1;
            z-index: 10;
            transform: scaleY(1.2);
            cursor: pointer;
        }
        .timeline-track-segment.work { background: var(--success); }
        .timeline-track-segment.waste { background: var(--danger); }
        .timeline-track-segment.legit { background: var(--accent); }

        .track-markers {
            position: relative;
            width: 100%;
            height: 15px;
            margin-bottom: 2rem;
            color: #666;
            font-size: 0.7rem;
            font-family: monospace;
        }
        .track-marker { position: absolute; transform: translateX(-50%); }

        /* Feed List */
        .timeline-feed { display: flex; flex-direction: column; gap: 0.4rem; }
        .timeline-event-row {
            display: flex;
            align-items: center;
            background: #242424;
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .event-time { width: 105px; color: #888; font-family: monospace; }
        .event-badge {
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
            width: 85px;
            text-align: center;
        }
        .event-badge.work { background: rgba(102, 187, 106, 0.15); color: var(--success); }
        .event-badge.waste { background: rgba(229, 115, 115, 0.15); color: var(--danger); }
        .event-badge.legit { background: rgba(255, 183, 77, 0.15); color: var(--accent); }
        .event-title { flex-grow: 1; color: var(--fg); min-width: 100px; }
        .event-duration { font-family: monospace; color: #aaa; text-align: right; }
      

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .clock-display { font-size: 3.5rem; }
            #wasted-clock .clock-display { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Focus Timer</h1>

    <!-- Setup -->
    <div id="setup-screen">
        <div class="setup-card">
            <input type="text" id="task-title" placeholder="Task Title / Goal">
            <input type="text" id="expected-time" placeholder="Expected Time (HH:MM)">
            <button class="pill-btn accent" id="start-btn">Start Session</button>
        </div>

        <!-- Journal -->
        <div id="journal-section">
            <h2>Journal</h2>
            <div class="journal-actions">
                <button class="pill-btn" style="background: var(--success); color: #1a1a1a;" id="open-timeline-btn">View Timeline</button>
                <button class="pill-btn" style="background: var(--info); color: #1a1a1a;" id="export-btn">Export JSON</button>
                <input type="file" id="import-input" accept=".json" style="display:none">
                <button class="pill-btn" id="import-btn">Import JSON</button>
                <button class="pill-btn" style="background: var(--danger); color: #fff;" id="reset-journal-btn">Reset Journal</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Date</th>
                        <th>Work Time</th>
                        <th>Wasted Time</th>
                        <th>Legit Pauses</th>
                        <th>Expected</th>
                        <th>Status</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="journal-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Timer -->
    <div id="timer-screen">
        <div id="session-info">
            <div class="title" id="display-title"></div>
            <div class="expected">Expected: <span id="display-expected"></span></div>
        </div>

        <div class="clock-card" id="work-clock">
            <div class="clock-label">Work Time</div>
            <div class="clock-display" id="work-display">00:00:00</div>
            <div class="controls">
                <button class="btn btn-play" id="play-pause-btn">Start</button>
                <button class="btn" id="legit-pause-btn" style="background: var(--info); color: #1a1a1a;">Legit Pause</button>
                <button class="btn btn-stop" id="stop-btn">Stop</button>
            </div>
        </div>

        <div class="clock-card" id="legit-clock" style="display: none; background: #2a2515; box-shadow: 0 8px 30px rgba(255, 213, 79, 0.15);">
            <div class="clock-label" id="legit-display-title">Legitimate Pause</div>
            <div class="clock-display" id="legit-display" style="color: #ffd54f;">00:00</div>
        </div>

        <div class="clock-card" id="wasted-clock">
            <div class="clock-label">Wasted Time</div>
            <div class="clock-display" id="wasted-display">00:00</div>
        </div>
    </div>

    <!-- Timeline Screen -->
 <!-- Timeline Screen -->
    <div id="timeline-screen">
        <h2>Timeline History</h2>
        <div class="timeline-filters-wrapper">
            <button class="pill-btn timeline-filter" data-range="24h">Last 24h</button>
            <button class="pill-btn timeline-filter" data-range="week">Last Week</button>
            <button class="pill-btn timeline-filter" data-range="month">Last Month</button>
            <button class="pill-btn timeline-filter" data-range="year">Last Year</button>
            <button class="pill-btn timeline-filter" data-range="all">All</button>
            <button class="pill-btn" id="timeline-back-btn" style="background: var(--muted-red); padding: 0.6rem 1.2rem; min-width: 0;">Back</button>
        </div>
        
        <div id="timeline-scroll-area" style="width: 100%; height: 70vh; overflow-y: auto; padding-right: 0.5rem; margin-top: 1rem;">
            <!-- Day Cards Injected Here Dynamically -->
        </div>
    </div>
    </div>


<!-- Modal: Session End Status -->
<div class="modal-overlay" id="status-modal">
    <div class="modal">
        <h3>How did this session end?</h3>
        <div class="modal-buttons">
            <button class="btn" id="abandoned-btn" style="background: var(--muted-red); color: #fff;">Abandoned</button>
            <button class="btn" id="completed-btn" style="background: var(--muted-green); color: #fff;">Completed</button>
        </div>
    </div>
</div>

<!-- Modal: Legit Pause Title -->
<div class="modal-overlay" id="legit-pause-modal">
    <div class="modal">
        <h3>Legitimate Pause</h3>
        <input type="text" id="legit-pause-input" placeholder="Title (e.g., Lunch break)">
        <div class="modal-buttons">
            <button class="btn" id="legit-cancel-btn" style="background: var(--muted-red); color: #fff;">Cancel</button>
            <button class="btn" id="legit-confirm-btn" style="background: var(--muted-green); color: #fff;">Pause Timer</button>
        </div>
    </div>
</div>

<!-- Modal: Legit Pause Details -->
<div class="modal-overlay" id="details-modal">
    <div class="modal" style="padding: 2rem;">
        <div id="details-content"></div>
        <button class="btn" onclick="document.getElementById('details-modal').style.display='none'" style="margin-top: 1.5rem; width: 100%; background: var(--pill-bg); color: #fff;">Close</button>
    </div>
</div>

<script>
// State Tracking
    let workSeconds = 0;
    let wastedSeconds = 0;
    let legitSeconds = 0;

    // Absolute time tracking to prevent background tab throttling
    let workAccumulated = 0;
    let wastedAccumulated = 0;
    let legitAccumulated = 0;
    
    let workStartTime = 0;
    let wastedStartTime = 0;
    let legitStartTime = 0;

    let isWorkRunning = false;
    let isLegitPaused = false;
    
    let workInterval = null;
    let wastedInterval = null;
    let legitInterval = null;
    
    let currentSession = null;

    // Elements
    const setupScreen = document.getElementById('setup-screen');
    const timerScreen = document.getElementById('timer-screen');
    
    const taskTitleInput = document.getElementById('task-title');
    const expectedTimeInput = document.getElementById('expected-time');
    const startBtn = document.getElementById('start-btn');
    const displayTitle = document.getElementById('display-title');
    const displayExpected = document.getElementById('display-expected');
    
    const workDisplay = document.getElementById('work-display');
    const wastedDisplay = document.getElementById('wasted-display');
    const legitDisplay = document.getElementById('legit-display');
    
    const playPauseBtn = document.getElementById('play-pause-btn');
    const stopBtn = document.getElementById('stop-btn');
    const legitPauseBtn = document.getElementById('legit-pause-btn');
    
    const statusModal = document.getElementById('status-modal');
    const abandonedBtn = document.getElementById('abandoned-btn');
    const completedBtn = document.getElementById('completed-btn');
    
    const legitPauseModal = document.getElementById('legit-pause-modal');
    const legitPauseInput = document.getElementById('legit-pause-input');
    const legitCancelBtn = document.getElementById('legit-cancel-btn');
    const legitConfirmBtn = document.getElementById('legit-confirm-btn');

    const journalBody = document.getElementById('journal-body');
    const exportBtn = document.getElementById('export-btn');
    const importBtn = document.getElementById('import-btn');
    const importInput = document.getElementById('import-input');
    const resetJournalBtn = document.getElementById('reset-journal-btn');

    // Helpers Formatting
    function formatWorkTime(totalSeconds) {
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function formatWastedTime(totalSeconds) {
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function updateDisplays() {
        workDisplay.textContent = formatWorkTime(workSeconds);
        wastedDisplay.textContent = formatWastedTime(wastedSeconds);
        legitDisplay.textContent = formatWastedTime(legitSeconds);
    }

    // Journal Storage
    function getJournal() {
        try { return JSON.parse(localStorage.getItem('focusTimerJournal')) || []; } 
        catch (e) { return []; }
    }

    function saveJournal(journal) {
        localStorage.setItem('focusTimerJournal', JSON.stringify(journal));
    }

    function renderJournal() {
        const journal = getJournal();
        journalBody.innerHTML = '';
        journal.sort((a, b) => new Date(b.startTime) - new Date(a.startTime));
        journal.forEach(entry => {
            const tr = document.createElement('tr');
            const dateStr = new Date(entry.startTime).toLocaleString();
            const statusClass = entry.status === 'completed' ? 'status-completed' : 'status-abandoned';
            tr.innerHTML = `
                <td>${escapeHtml(entry.title)}</td>
                <td>${dateStr}</td>
                <td>${formatWorkTime(entry.workSeconds)}</td>
                <td>${formatWastedTime(entry.wastedSeconds)}</td>
                <td>${formatWastedTime(entry.legitSeconds || 0)}</td>
                <td>${escapeHtml(entry.expectedTime)}</td>
                <td><span class="status-badge ${statusClass}">${entry.status}</span></td>
                <td><button class="pill-btn" style="padding: 0.3rem 0.6rem; min-width: auto; font-size: 0.75rem; border-radius: 6px;" onclick="showDetails('${entry.startTime}')">Details</button></td>
            `;
            journalBody.appendChild(tr);
        });
    }

    window.showDetails = function(startTime) {
        const journal = getJournal();
        const entry = journal.find(e => e.startTime === startTime);
        if (!entry) return;
        
        let pauses = (entry.events || []).filter(e => e.type === 'legit');
        
        let html = '<h4 style="font-weight: 500; font-size: 1.1rem; margin-bottom: 1rem; color: #fff;">Legitimate Pauses Details</h4>';
        html += '<ul style="text-align: left; list-style: none; padding: 0;">';
        if (pauses.length === 0) {
            html += '<li style="color: #aaa; text-align: center;">No legitimate pauses recorded.</li>';
        } else {
            pauses.forEach(p => {
                let durMs = p.end ? (p.end - p.start) : 0;
                html += `<li style="margin-bottom: 0.75rem; background: #2a2a2a; padding: 0.75rem; border-radius: 8px;">
                            <strong style="color: #ffd54f;">${escapeHtml(p.title)}</strong><br>
                            <span style="color: #aaa; font-size: 0.85rem;">Duration: ${formatWastedTime(Math.floor(durMs/1000))}</span>
                         </li>`;
            });
        }
        html += '</ul>';
        
        document.getElementById('details-content').innerHTML = html;
        document.getElementById('details-modal').style.display = 'flex';
    };

    // Tracking Event Lifecycle
    function closeLastEvent() {
        if (currentSession && currentSession.events && currentSession.events.length > 0) {
            let lastEvent = currentSession.events[currentSession.events.length - 1];
            if (!lastEvent.end) lastEvent.end = Date.now();
        }
    }

    // Timer Logic Hooks (Throttling-Proof)
    function startWork() {
        if (isWorkRunning) return;
        closeLastEvent();
        
        isWorkRunning = true;
        isLegitPaused = false;
        
        playPauseBtn.textContent = 'Pause';
        legitPauseBtn.disabled = false;
        
        // Stop and accumulate other timers
        if (wastedInterval) { clearInterval(wastedInterval); wastedInterval = null; wastedAccumulated = wastedSeconds; }
        if (legitInterval) { clearInterval(legitInterval); legitInterval = null; legitAccumulated = legitSeconds; }
        
        currentSession.events.push({ type: 'work', start: Date.now() });
        workStartTime = Date.now();
        
        workInterval = setInterval(() => {
            workSeconds = workAccumulated + Math.floor((Date.now() - workStartTime) / 1000);
            updateDisplays();
        }, 1000);
        
        document.getElementById('legit-clock').style.display = 'none';
    }

    function pauseWork() {
        if (!isWorkRunning) return;
        closeLastEvent();
        
        isWorkRunning = false;
        isLegitPaused = false;
        
        // Stop and accumulate work/legit
        if (workInterval) { clearInterval(workInterval); workInterval = null; workAccumulated = workSeconds; }
        if (legitInterval) { clearInterval(legitInterval); legitInterval = null; legitAccumulated = legitSeconds; }
        
        playPauseBtn.textContent = 'Resume';
        legitPauseBtn.disabled = false;
        
        currentSession.events.push({ type: 'waste', start: Date.now() });
        wastedStartTime = Date.now();
        
        wastedInterval = setInterval(() => {
            wastedSeconds = wastedAccumulated + Math.floor((Date.now() - wastedStartTime) / 1000);
            updateDisplays();
        }, 1000);
        
        document.getElementById('legit-clock').style.display = 'none';
    }

    function togglePlayPause() {
        if (isWorkRunning) pauseWork(); 
        else startWork(); 
    }

    function startLegitPause(title) {
        closeLastEvent();
        
        isWorkRunning = false;
        isLegitPaused = true;
        
        // Stop and accumulate work/wasted
        if (workInterval) { clearInterval(workInterval); workInterval = null; workAccumulated = workSeconds; }
        if (wastedInterval) { clearInterval(wastedInterval); wastedInterval = null; wastedAccumulated = wastedSeconds; }
        
        playPauseBtn.textContent = 'Resume'; 
        legitPauseBtn.disabled = true; 
        
        currentSession.events.push({ type: 'legit', start: Date.now(), title: title });
        legitStartTime = Date.now();
        
        legitInterval = setInterval(() => {
            legitSeconds = legitAccumulated + Math.floor((Date.now() - legitStartTime) / 1000);
            updateDisplays();
        }, 1000);
        
        document.getElementById('legit-display-title').textContent = "Paused: " + title;
        document.getElementById('legit-clock').style.display = 'block';
    }

    function stopSession() {
        closeLastEvent();
        
        if (workInterval) { clearInterval(workInterval); workInterval = null; workAccumulated = workSeconds; }
        if (wastedInterval) { clearInterval(wastedInterval); wastedInterval = null; wastedAccumulated = wastedSeconds; }
        if (legitInterval) { clearInterval(legitInterval); legitInterval = null; legitAccumulated = legitSeconds; }
        
        isWorkRunning = false;
        isLegitPaused = false;
        
        playPauseBtn.disabled = true;
        legitPauseBtn.disabled = true;
        stopBtn.disabled = true;
        
        playPauseBtn.style.opacity = 0.5;
        legitPauseBtn.style.opacity = 0.5;
        stopBtn.style.opacity = 0.5;
        
        statusModal.style.display = 'flex';
    }

    function resetAll() {
        if (workInterval) { clearInterval(workInterval); workInterval = null; }
        if (wastedInterval) { clearInterval(wastedInterval); wastedInterval = null; }
        if (legitInterval) { clearInterval(legitInterval); legitInterval = null; }
        
        workSeconds = 0;
        wastedSeconds = 0;
        legitSeconds = 0;
        
        workAccumulated = 0;
        wastedAccumulated = 0;
        legitAccumulated = 0;
        
        isWorkRunning = false;
        isLegitPaused = false;
        currentSession = null;
        
        updateDisplays();
        
        playPauseBtn.textContent = 'Start';
        playPauseBtn.disabled = false;
        legitPauseBtn.disabled = false;
        stopBtn.disabled = false;
        
        playPauseBtn.style.opacity = 1;
        legitPauseBtn.style.opacity = 1;
        stopBtn.style.opacity = 1;
        
        document.getElementById('legit-clock').style.display = 'none';
        timerScreen.style.display = 'none';
        setupScreen.style.display = 'flex';
        
        taskTitleInput.value = '';
        expectedTimeInput.value = '';
    }

    // Event Listeners (Setup & Run)
    startBtn.addEventListener('click', () => {
        const title = taskTitleInput.value.trim();
        const expected = expectedTimeInput.value.trim();
        if (!title || !expected) {
            alert('Please enter both a title and an expected time.');
            return;
        }
        currentSession = {
            title,
            expectedTime: expected,
            startTime: new Date().toISOString(),
            events: []
        };
        displayTitle.textContent = title;
        displayExpected.textContent = expected;
        
        setupScreen.style.display = 'none';
        timerScreen.style.display = 'flex';
        playPauseBtn.textContent = 'Start';
    });

    playPauseBtn.addEventListener('click', togglePlayPause);
    stopBtn.addEventListener('click', stopSession);

    // Legit Pause Modal Triggers
    legitPauseBtn.addEventListener('click', () => {
        legitPauseInput.value = '';
        legitPauseModal.style.display = 'flex';
        legitPauseInput.focus();
    });
    
    legitCancelBtn.addEventListener('click', () => legitPauseModal.style.display = 'none');
    
    legitConfirmBtn.addEventListener('click', () => {
        const title = legitPauseInput.value.trim();
        if (!title) { alert("Please provide a title."); return; }
        legitPauseModal.style.display = 'none';
        startLegitPause(title);
    });

    // End Session Callback
    function finishSession(status) {
        if (!currentSession) return;
        closeLastEvent();
        
        const entry = {
            ...currentSession,
            workSeconds,
            wastedSeconds,
            legitSeconds,
            status
        };
        const journal = getJournal();
        journal.push(entry);
        saveJournal(journal);
        renderJournal();
        
        statusModal.style.display = 'none';
        resetAll();
    }

    abandonedBtn.addEventListener('click', () => finishSession('abandoned'));
    completedBtn.addEventListener('click', () => finishSession('completed'));

    // Export / Import / Reset features
    exportBtn.addEventListener('click', () => {
        const journal = getJournal();
        const blob = new Blob([JSON.stringify(journal, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `focus-timer-journal-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    });

    importBtn.addEventListener('click', () => importInput.click());

    importInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const imported = JSON.parse(event.target.result);
                if (!Array.isArray(imported)) throw new Error('Invalid format');
                const journal = getJournal();
                const existingStarts = new Set(journal.map(j => j.startTime));
                let added = 0;
                imported.forEach(item => {
                    if (item && item.startTime && !existingStarts.has(item.startTime)) {
                        journal.push(item);
                        added++;
                    }
                });
                saveJournal(journal);
                renderJournal();
                alert(`Imported ${added} new session(s).`);
            } catch (err) {
                alert('Failed to import JSON: ' + err.message);
            }
            importInput.value = '';
        };
        reader.readAsText(file);
    });

    resetJournalBtn.addEventListener('click', () => {
        if (!confirm('Are you sure you want to permanently delete all journal entries?')) return;
        localStorage.removeItem('focusTimerJournal');
        renderJournal();
    });

    // -------- Timeline Engine --------

    function formatTimeRange(startMs, endMs) {
        const s = new Date(startMs);
        const e = new Date(endMs);
        const sStr = s.getHours().toString().padStart(2,'0') + ':' + s.getMinutes().toString().padStart(2,'0');
        const eStr = e.getHours().toString().padStart(2,'0') + ':' + e.getMinutes().toString().padStart(2,'0');
        return `${sStr} - ${eStr}`;
    }

    function formatDurationShort(ms) {
        let totalSecs = Math.floor(ms / 1000);
        if (totalSecs < 60) return `${totalSecs}s`;
        
        let totalMins = Math.floor(totalSecs / 60);
        let d = Math.floor(totalMins / 1440);
        let h = Math.floor((totalMins % 1440) / 60);
        let m = totalMins % 60;
        
        let parts = [];
        if (d > 0) parts.push(`${d}d`);
        if (h > 0) parts.push(`${h}h`);
        if (m > 0 || parts.length === 0) parts.push(`${m}m`);
        
        return parts.join(' ');
    }

function renderTimeline(filter = 'all') {
        setupScreen.style.display = 'none';
        timerScreen.style.display = 'none';
        document.getElementById('timeline-screen').style.display = 'flex';
        
        document.querySelectorAll('.timeline-filter').forEach(b => {
            b.classList.remove('active');
            if (b.getAttribute('data-range') === filter) b.classList.add('active');
        });
        
        const nowMs = Date.now();
        let rangeMs = Infinity; 
        if (filter === '24h') rangeMs = 24 * 3600 * 1000;
        else if (filter === 'week') rangeMs = 7 * 24 * 3600 * 1000;
        else if (filter === 'month') rangeMs = 30 * 24 * 3600 * 1000;
        else if (filter === 'year') rangeMs = 365 * 24 * 3600 * 1000;
        
        // 1. Extract raw events
        let rawEvents = [];
        const journal = getJournal();
        
        journal.forEach(entry => {
            let evs = entry.events || [];
            if (evs.length === 0) {
                let st = new Date(entry.startTime).getTime();
                if (entry.workSeconds > 0) { evs.push({ type: 'work', start: st, end: st + entry.workSeconds * 1000 }); st += entry.workSeconds * 1000; }
                if (entry.legitSeconds > 0) { evs.push({ type: 'legit', title: 'Legacy Pause', start: st, end: st + entry.legitSeconds * 1000 }); st += entry.legitSeconds * 1000; }
                if (entry.wastedSeconds > 0) { evs.push({ type: 'waste', start: st, end: st + entry.wastedSeconds * 1000 }); }
            }
            evs.forEach(e => { 
                if (e.start && e.end) {
                    if (!e.title) e.title = (e.type === 'work' ? entry.title : (e.type === 'waste' ? 'Distraction / Waste' : 'Pause'));
                    rawEvents.push(e); 
                }
            });
        });
        
        // Sort Chronologically
        rawEvents.sort((a,b) => a.start - b.start);
        
        // 2. Inject "Untracked" gaps
        let allEvents = [];
        let lastEnd = null;
        
        rawEvents.forEach(ev => {
            if (lastEnd !== null && ev.start > lastEnd) {
                // Ignore micro-gaps under 1 minute for UI cleanliness
                if ((ev.start - lastEnd) > 60000) {
                    allEvents.push({ type: 'untracked', start: lastEnd, end: ev.start, title: 'Untracked' });
                }
            }
            allEvents.push(ev);
            lastEnd = Math.max(lastEnd || 0, ev.end);
        });
        
        // Gap from last event up to exactly NOW
        if (lastEnd !== null && lastEnd < nowMs) {
            if ((nowMs - lastEnd) > 60000) {
                allEvents.push({ type: 'untracked', start: lastEnd, end: nowMs, title: 'Untracked' });
            }
        }
        
        // 3. Apply Date Range Cutoff
        if (rangeMs !== Infinity) {
            const cutoff = nowMs - rangeMs;
            allEvents = allEvents.filter(e => e.end > cutoff);
            allEvents.forEach(e => { if (e.start < cutoff) e.start = cutoff; }); 
        }
        
        // 4. Split events strictly at midnight (so night-spanning untracked time maps to the correct day)
        let splitEvents = [];
        allEvents.forEach(ev => {
            let currentStart = ev.start;
            let end = ev.end;
            while (currentStart < end) {
                let startD = new Date(currentStart);
                let nextMidnight = new Date(startD.getFullYear(), startD.getMonth(), startD.getDate() + 1).getTime();
                
                if (end <= nextMidnight) {
                    splitEvents.push({ ...ev, start: currentStart, end: end });
                    break;
                } else {
                    splitEvents.push({ ...ev, start: currentStart, end: nextMidnight });
                    currentStart = nextMidnight;
                }
            }
        });
        allEvents = splitEvents;
        
        // 5. Group by Day
        const groupedByDay = {};
        allEvents.forEach(ev => {
            const d = new Date(ev.start);
            const dayKey = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            const dayLabel = d.toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
            
            if (!groupedByDay[dayKey]) {
                groupedByDay[dayKey] = { dateObj: d, label: dayLabel, events: [], tWork: 0, tWaste: 0, tLegit: 0, tUntracked: 0 };
            }
            
            groupedByDay[dayKey].events.push(ev);
            
            const dur = ev.end - ev.start;
            if (ev.type === 'work') groupedByDay[dayKey].tWork += dur;
            if (ev.type === 'waste') groupedByDay[dayKey].tWaste += dur;
            if (ev.type === 'legit') groupedByDay[dayKey].tLegit += dur;
            if (ev.type === 'untracked') groupedByDay[dayKey].tUntracked += dur;
        });
        
        // 6. Build the DOM
        const container = document.getElementById('timeline-scroll-area');
        container.innerHTML = '';
        
        const typeLabels = { work: 'Work', waste: 'Wasted', legit: 'Pause', untracked: 'Untracked' };
        
        // Sort from Newest to Oldest
        const sortedDays = Object.keys(groupedByDay).sort((a,b) => b.localeCompare(a));
        
        if (sortedDays.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#888; padding: 3rem;">No data recorded for this time range.</div>';
            return;
        }

        sortedDays.forEach(dayKey => {
            const day = groupedByDay[dayKey];
            
            const msInDay = 24 * 60 * 60 * 1000;
            const startOfDay = new Date(day.dateObj);
            startOfDay.setHours(0,0,0,0);
            const startOfDayMs = startOfDay.getTime();
            
            let card = document.createElement('div');
            card.className = 'timeline-day-card';
            
            let html = `
                <div class="timeline-day-header">
                    <div class="timeline-date">${day.label}</div>
                    <div class="timeline-totals">
                        <span><b class="dot-work">•</b> ${formatDurationShort(day.tWork)}</span>
                        <span><b class="dot-waste">•</b> ${formatDurationShort(day.tWaste)}</span>
                        <span><b class="dot-legit">•</b> ${formatDurationShort(day.tLegit)}</span>
                        <span><b class="dot-untracked">•</b> ${formatDurationShort(day.tUntracked)}</span>
                    </div>
                </div>
            `;
            
            html += `<div class="timeline-track-container">`;
            day.events.forEach(ev => {
                let leftPerc = ((ev.start - startOfDayMs) / msInDay) * 100;
                let widthPerc = ((ev.end - ev.start) / msInDay) * 100;
                
                if (leftPerc < 0) { widthPerc += leftPerc; leftPerc = 0; }
                if (leftPerc + widthPerc > 100) { widthPerc = 100 - leftPerc; }
                if (widthPerc < 0.2) widthPerc = 0.2; 
                
                let hoverText = `${ev.title} \nDuration: ${formatDurationShort(ev.end - ev.start)} \nTime: ${formatTimeRange(ev.start, ev.end)}`;
                
                html += `<div class="timeline-track-segment ${ev.type}" style="left: ${leftPerc}%; width: ${widthPerc}%;" title="${hoverText}"></div>`;
            });
            html += `</div>`;
            
            html += `
                <div class="track-markers">
                    <span class="track-marker" style="left: 0%;">00:00</span>
                    <span class="track-marker" style="left: 25%;">06:00</span>
                    <span class="track-marker" style="left: 50%;">12:00</span>
                    <span class="track-marker" style="left: 75%;">18:00</span>
                    <span class="track-marker" style="left: 100%;">23:59</span>
                </div>
            `;
            
            html += `<div class="timeline-feed">`;
            day.events.forEach(ev => {
                html += `
                    <div class="timeline-event-row">
                        <span class="event-time">${formatTimeRange(ev.start, ev.end)}</span>
                        <span class="event-badge ${ev.type}">${typeLabels[ev.type]}</span>
                        <span class="event-title" ${ev.type === 'untracked' ? 'style="color: #777"' : ''}>${escapeHtml(ev.title)}</span>
                        <span class="event-duration">${formatDurationShort(ev.end - ev.start)}</span>
                    </div>
                `;
            });
            html += `</div>`;
            
            card.innerHTML = html;
            container.appendChild(card);
        });
    }
    document.getElementById('open-timeline-btn').addEventListener('click', () => renderTimeline('all'));
    document.getElementById('timeline-back-btn').addEventListener('click', () => {
        document.getElementById('timeline-screen').style.display = 'none';
        setupScreen.style.display = 'flex';
    });
    
    document.querySelectorAll('.timeline-filter').forEach(btn => {
        btn.addEventListener('click', (e) => {
            renderTimeline(e.target.getAttribute('data-range'));
        });
    });

    // Boot
    renderJournal();
</script>

</body>
